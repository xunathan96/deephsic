# -----------------------
#    TRAINING SETTINGS
# -----------------------

seed: 0
model:
  tied: False
  k: !include config/model/deepkernel/mlp/mlpA.dim4.yml
  l: !include config/model/deepkernel/mlp/mlpA.dim4.yml
dataset: !include config/dataset/hdgm/HDGM.dim8.yml

dataloader:
  train: &loader !torch.DataLoader
    batch_size: 512
    shuffle: True
    drop_last: False
    num_workers: 0    # Multiprocessing encounters errors on Windows
    pin_memory: True  # If you load your samples in the Dataset on CPU and would like to push it during training to the GPU, you can speed up the host to device transfer by enabling pin_memory
  val: *loader
  test: !torch.DataLoader
    batch_size: 2000  # each permutation test on 2000 samples
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True


optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.005

#scheduler: !scheduler.SequentialLR
#  schedulers:
#    - !scheduler.LinearLR                       {start_factor: 0.25, total_iters: 10000}
#    - !scheduler.CosineAnnealingWarmRestarts    {T_0: 5000}
#  milestones: [10000]

criterion: !criterion.HSICTestPower
  reg: 1.e-8
