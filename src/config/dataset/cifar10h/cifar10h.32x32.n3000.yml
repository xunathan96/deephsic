# -----------------------
#    DATASET SETTINGS
# -----------------------
name: 'Cifar10h-n3000'

train: !dataset.CIFAR10H
  root: 'data/cifar10h/raw'
  size: 3000
  split: 'train'
  train_val_test_split: '4:1:5'
  download: True
  transform: !transform.Compose
    - !transform.ToTensor
    - !transform.Normalize  {mean: [0.4914, 0.4822, 0.4465], std: [0.247, 0.243, 0.261]}

val: !dataset.CIFAR10H
  root: 'data/cifar10h/raw'
  size: 3000
  split: 'val'
  train_val_test_split: '4:1:5'
  download: True
  transform: !transform.Compose
    - !transform.ToTensor
    - !transform.Normalize  {mean: [0.4914, 0.4822, 0.4465], std: [0.247, 0.243, 0.261]}

test: !dataset.CIFAR10H
  root: 'data/cifar10h/raw'
  size: 3000
  split: 'test'
  train_val_test_split: '4:1:5'
  download: True
  transform: !transform.Compose
    - !transform.ToTensor
    - !transform.Normalize  {mean: [0.4914, 0.4822, 0.4465], std: [0.247, 0.243, 0.261]}

