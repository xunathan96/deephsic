# -----------------------
#    DATASET SETTINGS
# -----------------------
name: Emotion-2000

train: !dataset.Emotion &settings
  root: data/emotion/archive
  size: 2000
  split: train
  train_val_test_split: '1600:0:'
  transform: !transform.Compose
    - !transform.Grayscale
    - !transform.Resize     {size: 32}
    - !transform.ToTensor
    - !transform.Normalize  {mean: 0.5, std: 0.5}

val: !dataset.Emotion
  <<: *settings
  split: val

test: !dataset.Emotion
  <<: *settings
  size: null      # use entire dataset
  split: test
