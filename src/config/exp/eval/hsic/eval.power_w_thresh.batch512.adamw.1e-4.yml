# ------------------------
#   EVALUTATION SETTINGS
# ------------------------
method: hsic
seed: 0

dataloader:
  test: !torch.DataLoader
    batch_size: 512
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True

criterion: !criterion.HSICTestPower
  with_threshold: True
  significance: 0.05
  reg: 1.e-8
