# -----------------------
#   EVALUATION SETTINGS
# -----------------------

seed: 0
model:
  tied: False
  k: !include config/model/deepkernel/cnn/cnnA.yml
  l: !kernel.Gaussian
    name: bandwidth
    scale: 1
    bandwidth: 1
    trainable: True

dataset:
  test: !dataset.CIFAR10H
    name: 'Cifar10h'
    root: 'data/cifar10h/raw'
    split: 'test'
    download: True
    transform: !transform.Compose
      - !transform.ToTensor

dataloader:
  test: !torch.DataLoader
    batch_size: 100
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True

