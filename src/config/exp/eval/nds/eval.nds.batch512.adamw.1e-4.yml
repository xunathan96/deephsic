# ------------------------
#    EVALUATION SETTINGS
# ------------------------
method: nds
seed: 0

dataloader:
  test: !torch.DataLoader
    batch_size: 512
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True

criterion: !criterion.NDSTestPower
  with_threshold: False
  reg: 1.e-8
