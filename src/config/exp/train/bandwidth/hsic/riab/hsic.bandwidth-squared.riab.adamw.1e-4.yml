# -----------------------
#    TRAINING SETTINGS
# -----------------------

seed: 0
model: !include config/model/bandwidth/hsic/bandwidth-squared.yml
dataset: !include config/dataset/riab/riab_past.yml

dataloader:
  train: &loader !torch.DataLoader
    batch_size: 32
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: *loader
  test: *loader

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

criterion: !criterion.HSICTestPower
  reg: 1.e-8
