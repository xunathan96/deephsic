# -----------------------
#    TRAINING SETTINGS
# -----------------------

seed: 0
# model: !include config/model/c2st/id-id@mlp4x8x12x8x1.yml
# dataset: !include config/dataset/hdgm/hdgm4.yml

dataloader:
  train: !torch.DataLoader &loader
    batch_size: 64
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: !torch.DataLoader
    <<: *loader
  test: !torch.DataLoader
    <<: *loader
    drop_last: True

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

criterion: !criterion.MMDTestPower
  reg: 1.e-8
