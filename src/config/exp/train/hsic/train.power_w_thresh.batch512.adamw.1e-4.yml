# -----------------------
#    TRAINING SETTINGS
# -----------------------
method: hsic
seed: 20250401

dataloader:
  train: !torch.DataLoader &loader
    batch_size: 512
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: !torch.DataLoader
    <<: *loader
  test: !torch.DataLoader
    <<: *loader
    drop_last: True

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

criterion: !criterion.HSICTestPower
  with_threshold: True
  significance: 0.05
  reg: 1.e-8
