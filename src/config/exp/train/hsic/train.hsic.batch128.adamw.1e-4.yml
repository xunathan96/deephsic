# -----------------------
#    TRAINING SETTINGS
# -----------------------
method: hsic
seed: 0
# model: !include config/model/deepkernel/hsic/mlp2x4x6x4-squared.yml
# dataset: !include config/dataset/hdgm/hdgm4.n10000.yml

dataloader:
  train: !torch.DataLoader &loader
    batch_size: 128
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: !torch.DataLoader
    <<: *loader
  test: !torch.DataLoader
    <<: *loader
    drop_last: True

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

#scheduler: !scheduler.SequentialLR
#  schedulers:
#    - !scheduler.LinearLR                       {start_factor: 0.25, total_iters: 10000}
#    - !scheduler.CosineAnnealingWarmRestarts    {T_0: 5000}
#  milestones: [10000]

criterion: !criterion.HSICTestPower
  reg: 1.e-8
