# -----------------------
#    TRAINING SETTINGS
# -----------------------

seed: 0
model: !include config/model/deepkernel/mmd/transformer32#4-transformer4#4@24x32x32.yml
dataset: !include config/dataset/riab/riab_past.yml

dataloader:
  train: &loader !torch.DataLoader
    batch_size: 128
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: *loader
  test: !torch.DataLoader
    batch_size: 128
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

criterion: !criterion.MMDTestPower
  reg: 1.e-8
