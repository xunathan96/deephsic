# -----------------------
#    TRAINING SETTINGS
# -----------------------

seed: 0
model: !include config/model/deepkernel/hsic/mlp4x8x12x8-tied.yml
dataset: !include config/dataset/hdgm/hdgm8.yml

dataloader:
  train: &loader !torch.DataLoader
    batch_size: 512
    shuffle: True
    drop_last: False
    num_workers: 0
    pin_memory: True
  val: *loader
  test: !torch.DataLoader
    batch_size: 512
    shuffle: True
    drop_last: True
    num_workers: 0
    pin_memory: True

optimizer: !optim.AdamW
  lr: 1.0e-4
  betas: [0.9, 0.999]
  eps: 1.0e-8
  weight_decay: 0.0001

#scheduler: !scheduler.SequentialLR
#  schedulers:
#    - !scheduler.LinearLR                       {start_factor: 0.25, total_iters: 10000}
#    - !scheduler.CosineAnnealingWarmRestarts    {T_0: 5000}
#  milestones: [10000]

criterion: !criterion.HSICTestPower
  reg: 1.e-8
