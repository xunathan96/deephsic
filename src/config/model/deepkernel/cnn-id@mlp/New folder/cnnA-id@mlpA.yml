# -----------------------
#      MLP KERNEL
# -----------------------

!kernel.DeepKernel
name: cnnA-id@mlpA
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.CNN
      channels:     [3,8,16,32,64,10]
      kernel_size:  [4,4,4,4,1]
      stride:       [2,2,2,1,1]
      padding:      [1,1,1,0,0]
      dilation:     [1,1,1,1,1]
      activation:   ELU
      batch_norm:   False
      flatten:      True
    - !model.Identity
  heads: !nn.ModuleList
    - !model.MLP
      features: [11, 10, 10]
      activations: ELU
      batch_norm: False
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
eps: 0.01
trainable: True
