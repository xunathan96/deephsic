# -----------------------
#        MLP-MLP
# -----------------------

name: mlp4x8x12x8-squared
tied: False
k: &deepkernel !kernel.DeepKernel
  featurizer: !model.FeedForward
    features: [4, 8, 12, 8]
    activation: ReLU
    batch_norm: False
  feature_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  smoothing_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  eps: 0.01
  trainable: True
l: *deepkernel
