# -----------------------
#        MLP-MLP
# -----------------------

name: mlp5x10x15x10-squared
tied: False
k: &deepkernel !kernel.DeepKernel
  featurizer: !model.MLP
    features: [5, 10, 15, 10]
    activations: ELU
    batch_norm: False
  feature_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  smoothing_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  eps: 0.01
  trainable: True
l: *deepkernel
