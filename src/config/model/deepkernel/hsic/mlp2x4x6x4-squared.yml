# -----------------------
#        MLP-MLP
# -----------------------

name: mlp2x4x6x4-squared
tied: False
k: &deepkernel !kernel.DeepKernel
  featurizer: !model.MLP
    features: [2, 4, 6, 4]
    activations: ELU
    batch_norm: False
  feature_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  smoothing_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  eps: 0.01
  trainable: True
l: *deepkernel
