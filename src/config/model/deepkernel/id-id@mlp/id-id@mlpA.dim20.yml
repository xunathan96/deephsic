# -----------------------
#      MLP KERNEL
# -----------------------

!kernel.DeepKernel
name: id-id@mlpA.dim20
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.Identity
    - !model.Identity
  heads: !nn.ModuleList
    - !model.MLP
      features: [20, 60, 60, 60]
      activations: ELU
      batch_norm: False
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
eps: 0.01
trainable: True
