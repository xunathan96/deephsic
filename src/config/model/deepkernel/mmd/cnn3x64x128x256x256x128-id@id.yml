# -----------------------
#      CNN-ID > MLP
# -----------------------

!kernel.DeepKernel
name: cnn3x64x128x256x256x128-id@id
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.CNN
      channels:     [3,64,128,256,256,128]
      kernel_size:  [4,4,4,4,7]
      stride:       [2,2,2,2,1]
      padding:      [1,1,1,1,0]
      dilation:     [1,1,1,1,1]
      activation:   ELU
      batch_norm:   False
      flatten:      True
    - !model.Identity
  heads: !nn.ModuleList
    - !model.Identity
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 400
  trainable: True
eps: 0.01
trainable: True


# 3x112x112   (input)
# 64x56x56
# 128x28x28
# 256x14x14
# 256x7x7
# 128x1x1
# 129         (output)
