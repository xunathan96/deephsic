# -----------------------
#       ID-ID > MLP
# -----------------------

!kernel.DeepKernel
name: id-id@mlp4x8x12x8
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.Identity
    - !model.Identity
  heads: !nn.ModuleList
    - !model.FeedForward
      features: [4, 8, 12, 8]
      activation: ELU
      batch_norm: False
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
eps: 0.01
trainable: True
