# -----------------------
#       ID-ID > MLP
# -----------------------

!kernel.DeepKernel
name: id-id@mlp10x20x30x20
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.Identity
    - !model.Identity
  heads: !nn.ModuleList
    - !model.MLP
      features: [10, 20, 30, 20]
      activations: ELU
      batch_norm: False
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
eps: 0.01
trainable: True
