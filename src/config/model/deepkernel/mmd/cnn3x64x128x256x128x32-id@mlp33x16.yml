# -----------------------
#      CNN-ID > MLP
# -----------------------

!kernel.DeepKernel
name: cnn3x64x128x256x128x32-id@mlp33x16
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.ConvNet
      channels:       [3,64,128,256,128,32]
      kernel_size:    [4,4,4,4,7]
      stride:         [2,2,2,2,1]
      padding:        [1,1,1,1,0]
      dilation:       [1,1,1,1,1]
      activation:     ELU
      batch_norm:     False
      last_nonlinear: False
      flatten:        True
    - !model.Identity
  heads: !nn.ModuleList
    - !model.FeedForward
      features: [33, 16]
      activation: ELU
      batch_norm: False
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 400
  trainable: True
eps: 0.01
trainable: True


# 3x112x112   (input)
# 64x56x56
# 128x28x28
# 256x14x14
# 128x7x7
# 32x1x1
# 33 > 16    (output)
