# -----------------------
#       ID-ID > MLP
# -----------------------

!kernel.DeepKernel
name: id-id@mlp20x40x60x40
featurizer: !model.Neck
  backbones: !nn.ModuleList
    - !model.Identity
    - !model.Identity
  heads: !nn.ModuleList
    - !model.FeedForward
      features: [20, 40, 60, 40]
      activation: relu
      batch_norm: False
      init: default
  connection: cat
  squeeze_single_head: True
feature_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
smoothing_kernel: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True
eps: 0.01
trainable: True
