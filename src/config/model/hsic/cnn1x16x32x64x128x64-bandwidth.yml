# -----------------------
#      CNN-Gaussian
# -----------------------

name: cnn1x16x32x64x128x64-bandwidth
tied: False
k: !kernel.DeepKernel
  featurizer: !model.ConvNet
    channels:     [1,16,32,64,128,64]
    kernel_size:  [4,4,4,4,1]
    stride:       [2,2,2,1,1]
    padding:      [1,1,1,0,0]
    dilation:     [1,1,1,1,1]
    activation:   relu
    init:         default
    batch_norm:   False
    flatten:      True
  feature_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 1
    trainable: True
  smoothing_kernel: !kernel.Gaussian
    scale: 1
    bandwidth: 50
    trainable: True
  eps: 0.01
  trainable: True
l: !kernel.Gaussian
  scale: 1
  bandwidth: 1
  trainable: True

