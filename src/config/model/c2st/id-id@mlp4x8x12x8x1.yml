# -----------------------
#       ID-ID > MLP
# -----------------------

!model.Neck
name: id-id@mlp4x8x12x8x1
backbones: !nn.ModuleList
  - !model.Identity
  - !model.Identity
heads: !nn.ModuleList
  - !model.MLP
    features: [4, 8, 12, 8, 1]
    activations: ELU
    batch_norm: False
connection: cat
squeeze_single_head: True
