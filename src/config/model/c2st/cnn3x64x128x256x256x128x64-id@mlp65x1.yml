# -----------------------
#      CNN-ID > MLP
# -----------------------

!model.Neck
name: cnn3x64x128x256x256x128x64-id@mlp65x1
backbones: !nn.ModuleList
  - !model.ConvNet
    channels:       [3,64,128,256,256,128,64]
    kernel_size:    [4,4,4,4,7,1]
    stride:         [2,2,2,2,1,1]
    padding:        [1,1,1,1,0,0]
    dilation:       [1,1,1,1,1,1]
    activation:     ELU
    batch_norm:     False
    last_nonlinear: True
    flatten:        True
  - !model.Identity
heads: !nn.ModuleList
  - !model.FeedForward
    features: [65, 1]
    activation: ELU
    batch_norm: False
connection: cat
squeeze_single_head: True


# 3x112x112   (input)
# 64x56x56
# 128x28x28
# 256x14x14
# 256x7x7
# 128x1x1
# 64x1x1
# 65 > 1     (output)
