# -----------------------
#       ID-ID > MLP
# -----------------------

!model.Neck
name: id-id@mlp8x16x24x16x1
backbones: !nn.ModuleList
  - !model.Identity
  - !model.Identity
heads: !nn.ModuleList
  - !model.FeedForward
    features: [8, 16, 24, 16, 1]
    activation: relu
    batch_norm: False
    init: default
connection: cat
squeeze_single_head: True
