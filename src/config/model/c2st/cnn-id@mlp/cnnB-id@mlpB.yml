# -----------------------
#         NECK-B
# -----------------------

!model.Neck
name: cnnB-id@mlpB
backbones: !nn.ModuleList
  - !model.CNN
    name: cnn_featurizer
    channels:     [3,8,16,32,32]
    kernel_size:  [4,4,4,4]
    stride:       [2,2,2,1]
    padding:      [1,1,1,0]
    dilation:     [1,1,1,1]
    activation:   ELU
    batch_norm:   False
    flatten:      True
  - !model.Identity
heads: !nn.ModuleList
  - !model.MLP
    name: mlp_head
    features: [33, 16, 1]
    activations: ELU
    batch_norm: False
connection: cat
squeeze_single_head: True

# ------------------
# 3x32x32   (input)
# 8x16x16
# 16x8x8
# 32x4x4
# 32x1x1
# 33        (output)
# ------------------
# 33 -> 16 -> 1
