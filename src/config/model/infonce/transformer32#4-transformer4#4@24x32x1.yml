# -----------------------
#   Transformer^2 > MLP
# -----------------------

!model.Neck
name: transformer32#4-transformer4#4@24x32x1

backbones: !nn.ModuleList
  - !nn.Sequential
    - !model.TransformerEncoder
      seq_len: 12
      embed_dim: 32
      num_heads: 4
      expansion_factor: 4
      num_layers: 4
      activation: GELU
      drop_attn: 0
      drop_ff: 0
    - !model.FeedForward
      features: [32, 1]
      activation: GELU
      last_nonlinear: True
    - !nn.Flatten -2

  - !nn.Sequential
    - !model.TransformerEncoder
      seq_len: 12
      embed_dim: 4
      num_heads: 4
      expansion_factor: 4
      num_layers: 4
      activation: GELU
      drop_attn: 0
      drop_ff: 0
    - !model.FeedForward
      features: [4, 1]
      activation: GELU
      last_nonlinear: True
    - !nn.Flatten -2

connection: cat

heads: !nn.ModuleList
  - !model.FeedForward
    features: [24, 32, 1]
    activation: GELU
    last_nonlinear: False

squeeze_single_head: True
squeeze_scalar_output: True
