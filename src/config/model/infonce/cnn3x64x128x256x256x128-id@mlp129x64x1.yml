# -----------------------
#      CNN-ID > MLP
# -----------------------

!model.Neck
name: cnn3x64x128x256x256x128-id@mlp129x64x1
backbones: !nn.ModuleList
  - !model.CNN
    channels:     [3,64,128,256,256,128]
    kernel_size:  [4,4,4,4,7]
    stride:       [2,2,2,2,1]
    padding:      [1,1,1,1,0]
    dilation:     [1,1,1,1,1]
    activation:   ELU
    batch_norm:   False
    flatten:      True
  - !model.Identity
heads: !nn.ModuleList
  - !model.MLP
    features: [129, 64, 1]
    activations: ELU
    batch_norm: False
connection: cat
squeeze_single_head: True
squeeze_scalar_output: True


# 3x112x112     (input)
# 64x56x56
# 128x28x28
# 256x14x14
# 256x7x7
# 128x1x1
# 129 > 64 > 1  (output)
