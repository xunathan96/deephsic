# -----------------------
#       ID-ID > MLP
# -----------------------

!model.Neck
name: id-id@mlp18x32x64x32x1
backbones: !nn.ModuleList
  - !model.Identity
  - !model.Identity
heads: !nn.ModuleList
  - !model.FeedForward
    features: [18, 32, 64, 32, 1]
    activation: relu
    batch_norm: False
    init: narrow_normal
connection: cat
squeeze_single_head: True
squeeze_scalar_output: True
